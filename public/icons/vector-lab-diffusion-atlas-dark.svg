<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>Diffusion Atlas</title>
  <!-- Initial noise scatter (upper-left) -->
  <g fill="#8b3a3a" opacity="0.55">
    <circle cx="8" cy="14" r="0.9"/>
    <circle cx="13" cy="10" r="0.9"/>
    <circle cx="9" cy="20" r="0.9"/>
    <circle cx="15" cy="17" r="0.9"/>
    <circle cx="6" cy="18" r="0.9"/>
    <circle cx="14" cy="22" r="0.9"/>
  </g>
  <!-- Denoising trajectory (curved path) -->
  <path d="M 14 16 Q 28 22, 38 32 T 50 48" stroke="#8b3a3a" stroke-width="1" stroke-dasharray="2 2" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Step markers, increasing in solidity along the path -->
  <circle cx="14" cy="16" r="1.5" fill="#8b3a3a" opacity="0.65"/>
  <circle cx="24" cy="22" r="1.7" fill="#8b3a3a" opacity="0.8"/>
  <circle cx="32" cy="30" r="2" fill="#8b3a3a" opacity="0.9"/>
  <circle cx="40" cy="38" r="2.2" fill="#8b3a3a"/>
  <!-- Final coherent image -->
  <rect x="46" y="44" width="12" height="12" stroke="#8b3a3a" stroke-width="1.5" fill="none"/>
  <rect x="49" y="47" width="6" height="6" fill="#8b3a3a" opacity="0.95"/>
</svg>
